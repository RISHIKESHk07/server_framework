<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Connection Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #2d2d2d;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        button {
            background: #00ff88;
            color: #1a1a1a;
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #00cc6e;
            transform: scale(1.05);
        }
        #log {
            margin-top: 1.5rem;
            background: #000;
            color: #0f0;
            padding: 1rem;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            text-align: left;
            font-size: 0.9rem;
            min-height: 50px;
            border: 1px solid #333;
        }
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #555;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .online { background-color: #00ff88; box-shadow: 0 0 8px #00ff88; }
    </style>
</head>
<body>

<div class="container">
    <h2><span class="status-dot" id="dot"></span>Server Test</h2>
    <p>Testing connection to local server...</p>
    <button id="testBtn">Send Test Request</button>
    <div id="log">> Ready for testing...</div>
</div>

<script>
    const log = document.getElementById('log');
    const dot = document.getElementById('dot');
    
    document.getElementById('testBtn').addEventListener('click', async () => {
        log.innerText = '> Sending request...';
        
        try {
            // Change this URL to match your server's endpoint
            const response = await fetch('/api/test'); 
            const data = await response.text();
            
            log.innerText = `> Response: ${data}\n> Status: ${response.status} OK`;
            dot.classList.add('online');
        } catch (err) {
            log.innerText = `> Error: ${err.message}\n> Check server status.`;
            dot.classList.remove('online');
        }
    });
</script>

</body>
</html>
